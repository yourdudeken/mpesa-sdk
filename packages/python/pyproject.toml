[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "yourdudeken-mpesa-sdk"
version = "1.0.0"
description = "A Python SDK for Mpesa Daraja APIs"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Kennedy Muthengi", email = "ken@yourdudeken.com"},
]
keywords = ["mpesa", "daraja", "safaricom", "payments"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "requests>=2.28.0",
    "cryptography>=41.0.0",
]

[project.urls]
Homepage = "https://github.com/yourdudeken/mpesa"