name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release-ts:
    name: Publish TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build:ts
      - run: npm -w typescript version ${{ inputs.version }}
      - run: npm -w typescript publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-python:
    name: Publish Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: cd python && hatch build
      - run: cd python && hatch publish -u __token__ -a ${{ secrets.PYPI_TOKEN }}

  release-go:
    name: Tag Go Module
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          git tag go/v${{ github.event.inputs.version }}
          git push origin go/v${{ github.event.inputs.version }}
